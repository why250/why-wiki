name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz v4
        run: |
          git clone --depth 1 --branch v4 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Apply custom Quartz config
        run: |
          cp quartz.config.ts /tmp/quartz/quartz.config.ts
          cp quartz.layout.ts /tmp/quartz/quartz.layout.ts
          # Dynamically set baseUrl from repository info
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          BASE_URL="${OWNER}.github.io/${REPO_NAME}"
          sed -i "s|YOUR_GITHUB_USERNAME.github.io/why-wiki|${BASE_URL}|g" /tmp/quartz/quartz.config.ts
          sed -i "s|YOUR_GITHUB_USERNAME/why-wiki|${OWNER}/${REPO_NAME}|g" /tmp/quartz/quartz.layout.ts
          echo "baseUrl set to: ${BASE_URL}"

      - name: Copy wiki content
        run: |
          rm -rf /tmp/quartz/content/*
          cp -r wiki/* /tmp/quartz/content/

      - name: Install Quartz dependencies
        run: |
          cd /tmp/quartz
          npm install

      - name: Build Quartz site
        run: |
          cd /tmp/quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
